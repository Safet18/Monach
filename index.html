<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#eef3ff,#dfe8ff);
        }

        .login-container{
            width:400px;
            background:#fff;
            padding:40px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

        .avatar{
            width:120px;
            height:120px;
            margin:0 auto 30px;
            border:3px solid #71b6ff;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:60px;
            color:#5b7cff;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group input{
            width:100%;
            padding:15px;
            border:1px solid #d0d7e5;
            border-radius:12px;
            font-size:16px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#5b7cff;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#5b7cff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#4a6df0;
        }

        .support-btn{
            position:fixed;
            right:30px;
            bottom:30px;
            padding:12px 20px;
            border:2px solid #5b7cff;
            border-radius:30px;
            background:white;
            color:#5b7cff;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="avatar">
        <img src="images\logo_profile.png" alt="Описание картинки" width=100 height="100">
    </div>

    <div class="input-group">
        <input type="text" placeholder="Name">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Password">
    </div>

    <button id="login_btn" class="login-btn">Войти</button>
</div>

<button class="support-btn">❓Поддержка</button>
<script src="index.js"></script>
</body>
</html>
